title: "CUTLASS 学习指南"
description: "NVIDIA CUTLASS 中文学习文档 — 高性能 GPU 矩阵运算模板库"
baseurl: "/cutlass"
url: "https://justpi.github.io"

remote_theme: just-the-docs/just-the-docs@v0.10.0

color_scheme: light

permalink: pretty

aux_links:
  "GitHub":
    - "https://github.com/justpi/cutlass"
  "NVIDIA 官方":
    - "https://github.com/NVIDIA/cutlass"

nav_sort: case_insensitive
heading_anchors: true

search_enabled: true
search:
  heading_level: 3

back_to_top: true
back_to_top_text: "回到顶部"

footer_content: "CUTLASS 中文学习指南 · 基于 NVIDIA CUTLASS v4.4.2 官方文档整理"

callouts:
  note:
    title: 注意
    color: blue
  warning:
    title: 警告
    color: red
  tip:
    title: 提示
    color: green

exclude:
  - Gemfile.lock
  - node_modules
  - vendor
